<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Hub - Hint Screen</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="shortcut icon" type="image/png" href="/favicon.png?v=2">
    <style>
        :root {
            --bg: #121212;
            --card: #1c1c1c;
            --text: #e6e6e6;
            --muted: #9a9a9a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }
        .frame {
            width: min(900px, 96vw);
            min-height: 60vh;
            background: var(--card);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .hint-card {
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a2a2a;
            box-shadow: 0 6px 18px rgba(0,0,0,0.35);
        }
        .hint-text {
            font-size: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
            margin: 0;
        }
        .hint-source {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 6px;
        }
        .empty {
            margin: 0 auto;
            color: var(--muted);
            font-size: 14px;
            padding: 40px 10px;
            text-align: center;
        }
        .screensaver {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .victory-overlay {
            position: fixed;
            inset: 0;
            background: #0b0b0b;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 6;
        }
        .victory-overlay.active { display: flex; }
        .victory-card {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
            box-shadow: none;
        }
        .victory-media {
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            background: #0b0b0b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .victory-media img,
        .victory-media iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
        }
        .victory-message {
            position: absolute;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            z-index: 7;
        }
        .screensaver.hidden { display: none; }
        .screensaver img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
        .screensaver .fallback { color: var(--muted); font-size: 16px; }
        .content-hidden { visibility: hidden; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="screensaver" id="screensaver">
        <div class="fallback">Screensaver</div>
    </div>
    <div class="victory-overlay" id="victory-overlay">
        <div class="victory-card">
            <div class="victory-media" id="victory-media">
                <div class="empty">Victory</div>
            </div>
        </div>
        <div class="victory-message" id="victory-message">Room was solved</div>
    </div>
    <div class="frame" id="hint-frame">
        <div class="list" id="hint-list">
            <div class="empty">No hints available.</div>
        </div>
    </div>

    <script>
        const url = new URL(window.location.href);
        const queryName = url.searchParams.get('screen');
        const pathName = decodeURIComponent(window.location.pathname).replace(/^\/+/, '');
        const screenSlug = (queryName || pathName || '').toString().trim().toLowerCase().replace(/[^a-z0-9-_]/g, '');
        const roleUrl = screenSlug ? `/api/screens/${encodeURIComponent(screenSlug)}/status` : null;
        let fixedScreenKey = queryName || pathName || '';
        const originalPath = window.location.pathname + window.location.search;
        const hintList = document.getElementById('hint-list');
        const saver = document.getElementById('screensaver');
        const frame = document.getElementById('hint-frame');
        const victoryOverlay = document.getElementById('victory-overlay');
        const victoryMedia = document.getElementById('victory-media');
        const victoryMessage = document.getElementById('victory-message');
        let saverUrl = null;
        let redirected = false;
        let missingHandled = false;
        let lastMissingReload = 0;
        let victoryUrl = null;
        let victoryTimer = null;
        let branchSolvedCache = new Set();
        let lastRedirectAt = 0;

        function safeReplace(url) {
            const now = Date.now();
            if (now - lastRedirectAt < 2000) return;
            lastRedirectAt = now;
            window.location.replace(url);
        }

        function handleMissing() {
            if (missingHandled) return;
            missingHandled = true;
            const now = Date.now();
            if (now - lastMissingReload < 2000) return; // avoid rapid reload loops
            lastMissingReload = now;
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.location.reload();
                }
            } catch (e) { /* ignore */ }
            try { window.close(); } catch (e) { /* ignore */ }
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('_miss', Date.now());
            setTimeout(() => { safeReplace(newUrl.toString()); }, 800);
        }

        function showSaver(on) {
            if (on) {
                saver.classList.remove('hidden');
                frame.classList.add('content-hidden');
            } else {
                saver.classList.add('hidden');
                frame.classList.remove('content-hidden');
            }
        }

        function applySaver(url) {
            if (!url || url === saverUrl) return;
            saverUrl = url;
            saver.innerHTML = '';
            if (/\.html?(\?|$)/i.test(url)) {
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.title = 'Screensaver';
                iframe.style.width = '90vw';
                iframe.style.height = '90vh';
                iframe.style.border = 'none';
                saver.appendChild(iframe);
            } else {
                const img = document.createElement('img');
                img.src = saverUrl;
                img.alt = 'Screensaver';
                saver.appendChild(img);
            }
        }

        function cacheBust(url) {
            const sep = url.includes('?') ? '&' : '?';
            return `${url}${sep}v=${Date.now()}`;
        }

        function buildVictoryUrl(url, payload) {
            if (!payload || !/\.html?(\?|$)/i.test(url)) return url;
            const sep = url.includes('?') ? '&' : '?';
            if (payload.room) return `${url}${sep}room=1`;
            if (Number.isFinite(payload.branch)) return `${url}${sep}branch=${payload.branch}`;
            return url;
        }

        function applyVictoryMedia(url, payload) {
            if (!victoryMedia || !url || url === victoryUrl) return;
            const resolved = buildVictoryUrl(url, payload);
            victoryUrl = resolved;
            victoryMedia.innerHTML = '';
            if (/\.html?(\?|$)/i.test(url)) {
                const iframe = document.createElement('iframe');
                iframe.src = cacheBust(resolved);
                iframe.title = 'Victory';
                victoryMedia.appendChild(iframe);
            } else {
                const img = document.createElement('img');
                img.src = cacheBust(resolved);
                img.alt = 'Victory';
                victoryMedia.appendChild(img);
            }
        }

        function showVictoryFlash(message, url, payload) {
            if (!victoryOverlay) return;
            const isHtml = url && /\.html?(\?|$)/i.test(url);
            if (victoryMessage) {
                victoryMessage.textContent = message || '';
                victoryMessage.classList.toggle('hidden', isHtml);
            }
            if (url) applyVictoryMedia(url, payload);
            victoryOverlay.classList.add('active');
            if (victoryTimer) clearTimeout(victoryTimer);
            victoryTimer = setTimeout(() => {
                victoryOverlay.classList.remove('active');
            }, 5000);
        }

        function computeSolvedBranches(branches, statusMap) {
            const solved = new Set();
            branches.forEach(branch => {
                const puzzles = branch.puzzles || [];
                if (!puzzles.length) return;
                const allSolved = puzzles.every(p => {
                    const st = (statusMap[p.id]?.state || '').toLowerCase();
                    return st === 'solved';
                });
                if (allSolved) solved.add(branch.id);
            });
            return solved;
        }

        async function pollVictory() {
            try {
                const [statusRes, settingsRes, flowRes, puzzleStatusRes] = await Promise.all([
                    fetch('/api/runtime/room/status', { cache: 'no-store' }),
                    fetch('/api/system/settings', { cache: 'no-store' }),
                    fetch('/api/runtime/puzzle-flow', { cache: 'no-store' }),
                    fetch('/api/runtime/status', { cache: 'no-store' })
                ]);
                if (!statusRes.ok) return;
                const status = await statusRes.json();
                const settings = settingsRes.ok ? await settingsRes.json() : {};
                const flowData = flowRes.ok ? await flowRes.json() : {};
                const puzzleStatus = puzzleStatusRes.ok ? await puzzleStatusRes.json() : {};
                const running = !!status.running;

                if (!running) {
                    branchSolvedCache = new Set();
                    return;
                }

                const branches = Array.isArray(flowData.branches) ? flowData.branches : [];
                const solvedNow = computeSolvedBranches(branches, puzzleStatus);
                branches.forEach((branch, idx) => {
                    if (solvedNow.has(branch.id) && !branchSolvedCache.has(branch.id)) {
                        const isRoom = branches.length <= 1;
                        const label = isRoom ? 'The room was solve' : `Branch ${idx + 1} was solved`;
                        showVictoryFlash(label, settings.settings?.victoryScreen || null, { room: isRoom, branch: idx + 1 });
                    }
                });
                branchSolvedCache = solvedNow;
            } catch (err) {
                // ignore transient errors; next poll will retry
            }
        }

        async function fetchHints() {
            try {
                const endpoint = fixedScreenKey ? `/api/hints/${encodeURIComponent(fixedScreenKey)}` : '/api/hints';
                const [hintRes, statusRes, settingsRes, flowRes, puzzleStatusRes] = await Promise.all([
                    fetch(endpoint, { cache: 'no-store' }),
                    fetch('/api/runtime/room/status', { cache: 'no-store' }),
                    fetch('/api/system/settings', { cache: 'no-store' }),
                    fetch('/api/runtime/puzzle-flow', { cache: 'no-store' }),
                    fetch('/api/runtime/status', { cache: 'no-store' })
                ]);
                const status = await statusRes.json();
                const settings = await settingsRes.json();
                const flowData = flowRes.ok ? await flowRes.json() : {};
                const puzzleStatus = puzzleStatusRes.ok ? await puzzleStatusRes.json() : {};
                const total = status?.puzzles?.total || 0;
                const solved = status?.puzzles?.solved || 0;
                const solvedAll = total > 0 && solved >= total;
                const running = !!status.running;

                if (settingsRes.ok && settings.settings && settings.settings.screenSaverImage) {
                    applySaver(settings.settings.screenSaverImage);
                }
                if (!hintRes.ok) {
                    if (hintRes.status === 404) {
                        hintList.innerHTML = `<div class="empty">Hint screen not found.</div>`;
                        showSaver(true);
                        handleMissing();
                    } else {
                        hintList.innerHTML = `<div class="empty">Connection lost...</div>`;
                        showSaver(true);
                    }
                    return;
                }
                const data = await hintRes.json();
                if (data.success === false) {
                    hintList.innerHTML = `<div class="empty">Hint screen not found.</div>`;
                    showSaver(true);
                    handleMissing();
                    return;
                }
                if (!fixedScreenKey && data.screenName) {
                    fixedScreenKey = data.screenName;
                }
                renderHints(data.hints || [], { running, solvedAll });
            } catch (err) {
                console.error('Hint fetch failed', err);
                hintList.innerHTML = `<div class="empty">Connection lost...</div>`;
                showSaver(true);
                // no hard reload on transient errors; retry in next poll
            }
        }

        function renderHints(hints, { running, solvedAll }) {
            const hasHints = Array.isArray(hints) && hints.length > 0;
            if (!running) {
                showSaver(true);
                hintList.innerHTML = `<div class="empty">No hints available.</div>`;
                if (!redirected) {
                    redirected = true;
                    safeReplace(`/screensaver.html?type=hint&screen=${encodeURIComponent(fixedScreenKey || '')}&return=${encodeURIComponent(originalPath)}`);
                }
                return;
            }
            redirected = false;

            if (!hasHints) {
                showSaver(true);
                hintList.innerHTML = ``;
                return;
            }

            showSaver(false);
            let html = '';
            hints.forEach(h => {
                const source = (h.showAssignment !== false) ? (h.puzzleName || '').trim() : '';
                html += `
                    <div class="hint-card">
                        ${source ? `<div class="hint-source">${source}</div>` : ''}
                        <p class="hint-text">${(h.text || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
                    </div>`;
            });
            hintList.innerHTML = html;
        }

        fetchHints();
        setInterval(fetchHints, 5000);
        pollVictory();
        setInterval(pollVictory, 5000);

        async function pollRole() {
            if (!roleUrl) return;
            try {
                const res = await fetch(roleUrl, { cache: 'no-store' });
                if (!res.ok) return;
                const data = await res.json();
                if (!data.exists) return;
                const role = (data.role || 'player').toLowerCase();
                if (role === 'player' || role === 'progress') {
                    safeReplace('/' + encodeURIComponent(screenSlug));
                }
            } catch (e) {
                // ignore transient network errors
            }
        }

        pollRole();
        setInterval(pollRole, 5000);

        const eventSource = new EventSource('/api/events');
        eventSource.addEventListener('update', (evt) => {
            try {
                const data = JSON.parse(evt.data || '{}');
                const type = (data?.type || '').toString();
                if (['hints', 'puzzle-state', 'room-restart', 'branch-restart'].includes(type)) {
                    fetchHints();
                    pollVictory();
                }
                if (type === 'room-config') {
                    pollRole();
                }
            } catch (e) {}
        });

        // periodically verify that this screen path still exists; if not, reload to show error
        setInterval(async () => {
            if (missingHandled) return;
            try {
                const headRes = await fetch(window.location.pathname + (window.location.search || ''), { method: 'HEAD', cache: 'no-store' });
                if (!headRes.ok) {
                    handleMissing();
                }
            } catch (e) {
                handleMissing();
            }
        }, 5000);
    </script>
</body>
</html>
