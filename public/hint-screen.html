<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Hub - Hint Screen</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1c1c1c;
            --text: #e6e6e6;
            --muted: #9a9a9a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }
        .frame {
            width: min(900px, 96vw);
            min-height: 60vh;
            background: var(--card);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .hint-card {
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a2a2a;
            box-shadow: 0 6px 18px rgba(0,0,0,0.35);
        }
        .hint-text {
            font-size: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
            margin: 0;
        }
        .hint-source {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 6px;
        }
        .empty {
            margin: 0 auto;
            color: var(--muted);
            font-size: 14px;
            padding: 40px 10px;
            text-align: center;
        }
        .screensaver {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .screensaver.hidden { display: none; }
        .screensaver img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
        .screensaver .fallback { color: var(--muted); font-size: 16px; }
        .content-hidden { visibility: hidden; }
    </style>
</head>
<body>
    <div class="screensaver" id="screensaver">
        <div class="fallback">Screensaver</div>
    </div>
    <div class="frame" id="hint-frame">
        <div class="list" id="hint-list">
            <div class="empty">No hints available.</div>
        </div>
    </div>

    <script>
        const url = new URL(window.location.href);
        const queryName = url.searchParams.get('screen');
        const pathName = decodeURIComponent(window.location.pathname).replace(/^\/+/, '');
        let fixedScreenKey = queryName || pathName || '';
        const originalPath = window.location.pathname + window.location.search;
        const hintList = document.getElementById('hint-list');
        const saver = document.getElementById('screensaver');
        const frame = document.getElementById('hint-frame');
        let saverUrl = null;
        let redirected = false;
        let missingHandled = false;
        let lastMissingReload = 0;

        function handleMissing() {
            if (missingHandled) return;
            missingHandled = true;
            const now = Date.now();
            if (now - lastMissingReload < 2000) return; // avoid rapid reload loops
            lastMissingReload = now;
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.location.reload();
                }
            } catch (e) { /* ignore */ }
            try { window.close(); } catch (e) { /* ignore */ }
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('_miss', Date.now());
            setTimeout(() => { window.location.replace(newUrl.toString()); }, 800);
        }

        function showSaver(on) {
            if (on) {
                saver.classList.remove('hidden');
                frame.classList.add('content-hidden');
            } else {
                saver.classList.add('hidden');
                frame.classList.remove('content-hidden');
            }
        }

        function applySaver(url) {
            if (!url || url === saverUrl) return;
            saverUrl = url;
            saver.innerHTML = '';
            if (/\.html?(\?|$)/i.test(url)) {
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.title = 'Screensaver';
                iframe.style.width = '90vw';
                iframe.style.height = '90vh';
                iframe.style.border = 'none';
                saver.appendChild(iframe);
            } else {
                const img = document.createElement('img');
                img.src = saverUrl;
                img.alt = 'Screensaver';
                saver.appendChild(img);
            }
        }

        async function fetchHints() {
            try {
                const endpoint = fixedScreenKey ? `/api/hints/${encodeURIComponent(fixedScreenKey)}` : '/api/hints';
                const [hintRes, statusRes, settingsRes] = await Promise.all([
                    fetch(endpoint, { cache: 'no-store' }),
                    fetch('/api/runtime/room/status', { cache: 'no-store' }),
                    fetch('/api/system/settings', { cache: 'no-store' })
                ]);
                const status = await statusRes.json();
                const settings = await settingsRes.json();
                const total = status?.puzzles?.total || 0;
                const solved = status?.puzzles?.solved || 0;
                const solvedAll = total > 0 && solved >= total;
                const running = !!status.running;

                if (settingsRes.ok && settings.settings && settings.settings.screenSaverImage) {
                    applySaver(settings.settings.screenSaverImage);
                }
                if (!hintRes.ok) {
                    if (hintRes.status === 404) {
                        hintList.innerHTML = `<div class="empty">Hint screen not found.</div>`;
                        showSaver(true);
                        handleMissing();
                    } else {
                        hintList.innerHTML = `<div class="empty">Connection lost...</div>`;
                        showSaver(true);
                    }
                    return;
                }
                const data = await hintRes.json();
                if (data.success === false) {
                    hintList.innerHTML = `<div class="empty">Hint screen not found.</div>`;
                    showSaver(true);
                    handleMissing();
                    return;
                }
                if (!fixedScreenKey && data.screenName) {
                    fixedScreenKey = data.screenName;
                }
                renderHints(data.hints || [], { running, solvedAll });
            } catch (err) {
                console.error('Hint fetch failed', err);
                hintList.innerHTML = `<div class="empty">Connection lost...</div>`;
                showSaver(true);
                // no hard reload on transient errors; retry in next poll
            }
        }

        function renderHints(hints, { running, solvedAll }) {
            const hasHints = Array.isArray(hints) && hints.length > 0;
            if (solvedAll) {
                if (!redirected) {
                    redirected = true;
                    window.location.replace(`/screensaver.html?type=victory&screen=${encodeURIComponent(fixedScreenKey || '')}&return=${encodeURIComponent(originalPath)}`);
                }
                return;
            }
            redirected = false;
            if (!running) {
                showSaver(true);
                hintList.innerHTML = `<div class="empty">No hints available.</div>`;
                if (!redirected) {
                    redirected = true;
                    window.location.replace(`/screensaver.html?type=hint&screen=${encodeURIComponent(fixedScreenKey || '')}&return=${encodeURIComponent(originalPath)}`);
                }
                return;
            }
            redirected = false;

            if (!hasHints) {
                showSaver(true);
                hintList.innerHTML = ``;
                return;
            }

            showSaver(false);
            let html = '';
            hints.forEach(h => {
                const source = (h.showAssignment !== false) ? (h.puzzleName || '').trim() : '';
                html += `
                    <div class="hint-card">
                        ${source ? `<div class="hint-source">${source}</div>` : ''}
                        <p class="hint-text">${(h.text || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
                    </div>`;
            });
            hintList.innerHTML = html;
        }

        fetchHints();
        setInterval(fetchHints, 1500);

        // periodically verify that this screen path still exists; if not, reload to show error
        setInterval(async () => {
            if (missingHandled) return;
            try {
                const headRes = await fetch(window.location.pathname + (window.location.search || ''), { method: 'HEAD', cache: 'no-store' });
                if (!headRes.ok) {
                    handleMissing();
                }
            } catch (e) {
                handleMissing();
            }
        }, 5000);
    </script>
</body>
</html>
