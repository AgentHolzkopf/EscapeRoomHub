<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Studio</title>
    <style>
        :root {
            --bg: #111111;
            --text: #a6a6a6;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        .title {
            margin: 0;
            font-size: clamp(28px, 4vw, 48px);
            font-weight: 800;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="title">THE STUDIO™</div>
</body>
</html>
