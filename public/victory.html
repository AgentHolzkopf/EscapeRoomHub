<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory</title>
    <style>
        :root {
            --bg: #111111;
            --panel: #1a1a1a;
            --text: #e6e6e6;
            --muted: #9a9a9a;
            --accent: #888888;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 35%), var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 48px 56px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.45);
            text-align: center;
            max-width: 720px;
            width: min(720px, 92vw);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(136,136,136,0.18);
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            font-size: 12px;
        }
        h1 {
            margin: 18px 0 10px;
            font-size: clamp(28px, 5vw, 48px);
            letter-spacing: 0.02em;
        }
        p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge" id="victory-badge">The room was solve</div>
        <h1>Congratulations</h1>
        <p id="victory-text">The room was solve.</p>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const badge = document.getElementById('victory-badge');
            const text = document.getElementById('victory-text');
            const branchRaw = params.get('branch');
            const roomFlag = params.has('room');
            const branchNum = branchRaw ? parseInt(branchRaw, 10) : null;
            let message = 'The room was solve';

            if (!roomFlag && Number.isFinite(branchNum)) {
                message = `Branch ${branchNum} was solved`;
            }

            if (badge) badge.textContent = message;
            if (text) text.textContent = `${message}.`;
        })();
    </script>
</body>
</html>
